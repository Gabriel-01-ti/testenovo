<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cardápio Completo</title>

<style>
body{
  font-family: Arial;
  background:#0f0f0f;
  color:white;
  padding:20px;
}

h1,h2,h3{
  color:#00a86b;
}

.pizza-box, .produtos-box{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:15px;
  margin-top:15px;
}

.sabor, .produto{
  background:#1c1c1c;
  border-radius:10px;
  padding:10px;
  text-align:center;
  cursor:pointer;
  border:2px solid transparent;
}

.sabor img, .produto img{
  width:100%;
  height:110px;
  object-fit:cover;
  border-radius:8px;
}

.sabor.selecionado{
  border:2px solid #00ff9c;
  box-shadow:0 0 10px #00ff9c;
}

button{
  background:#00a86b;
  border:none;
  padding:6px 10px;
  color:white;
  border-radius:6px;
  cursor:pointer;
  margin-top:5px;
}

select{
  padding:8px;
  background:#1c1c1c;
  color:white;
  border:1px solid #00a86b;
  margin-top:5px;
}

.carrinho{
  background:#1c1c1c;
  padding:15px;
  border-radius:10px;
  margin-top:30px;
}

.remover{
  color:red;
  cursor:pointer;
  margin-left:10px;
}
</style>
</head>

<body>

<h1>🍕 Pizzaria Exemplo</h1>

<!-- ================= PIZZA SALGADA ================= -->
<h2>Pizza Salgada</h2>

<label>Tamanho:</label>
<select id="tamanhoSalgada" onchange="alterarLimite('salgada')">
<option value="Pequena-30">Pequena - R$30 (1 sabor)</option>
<option value="Média-40">Média - R$40 (2 sabores)</option>
<option value="Grande-50">Grande - R$50 (3 sabores)</option>
</select>

<div class="pizza-box">
<div class="sabor salgada" onclick="toggleSabor(this,'Calabresa','salgada')">
<img src="imagens/calabresa.jpg">
<p>Calabresa</p>
</div>

<div class="sabor salgada" onclick="toggleSabor(this,'Frango','salgada')">
<img src="imagens/frango.jpg">
<p>Frango</p>
</div>

<div class="sabor salgada" onclick="toggleSabor(this,'Portuguesa','salgada')">
<img src="imagens/portuguesa.jpg">
<p>Portuguesa</p>
</div>
</div>

<h3>Borda:</h3>
<select id="bordaSalgada">
<option value="Sem borda-0">Sem borda</option>
<option value="Catupiry-15">Catupiry (+15)</option>
<option value="Cheddar-15">Cheddar (+15)</option>
</select>

<br>
<button onclick="adicionarPizza('salgada')">Adicionar Pizza Salgada</button>

<!-- ================= PIZZA DOCE ================= -->
<h2>Pizza Doce</h2>

<label>Tamanho:</label>
<select id="tamanhoDoce" onchange="alterarLimite('doce')">
<option value="Pequena-35">Pequena - R$35 (1 sabor)</option>
<option value="Média-45">Média - R$45 (2 sabores)</option>
<option value="Grande-55">Grande - R$55 (3 sabores)</option>
</select>

<div class="pizza-box">
<div class="sabor doce" onclick="toggleSabor(this,'Chocolate','doce')">
<img src="imagens/chocolate.jpg">
<p>Chocolate</p>
</div>

<div class="sabor doce" onclick="toggleSabor(this,'Morango','doce')">
<img src="imagens/morango.jpg">
<p>Morango</p>
</div>
</div>

<h3>Borda:</h3>
<select id="bordaDoce">
<option value="Sem borda-0">Sem borda</option>
<option value="Chocolate-15">Chocolate (+15)</option>
</select>

<br>
<button onclick="adicionarPizza('doce')">Adicionar Pizza Doce</button>

<!-- ================= LANCHES ================= -->
<h2>🍔 Lanches</h2>

<div class="produtos-box">
<div class="produto">
<img src="imagens/xburguer.jpg">
<p>X-Burguer<br>R$18</p>
<button onclick="adicionarItem('X-Burguer',18)">Adicionar</button>
</div>

<div class="produto">
<img src="imagens/xsalada.jpg">
<p>X-Salada<br>R$20</p>
<button onclick="adicionarItem('X-Salada',20)">Adicionar</button>
</div>
</div>

<!-- ================= BEBIDAS ================= -->
<h2>🥤 Bebidas</h2>

<div class="produtos-box">
<div class="produto">
<img src="imagens/coca.jpg">
<p>Coca-Cola 2L<br>R$12</p>
<button onclick="adicionarItem('Coca-Cola 2L',12)">Adicionar</button>
</div>

<div class="produto">
<img src="imagens/guarana.jpg">
<p>Guaraná 2L<br>R$10</p>
<button onclick="adicionarItem('Guaraná 2L',10)">Adicionar</button>
</div>
</div>

<!-- ================= CARRINHO ================= -->
<div class="carrinho">
<h2>🛒 Carrinho</h2>
<ul id="listaCarrinho"></ul>
<p><strong>Total: R$ <span id="total">0</span></strong></p>
<p><small>⚠ Taxa de entrega será informada no WhatsApp.</small></p>
<button onclick="enviarPedido()">Pedir no WhatsApp</button>
</div>

<script>
const NUMERO_WHATSAPP = "5599999999999";

let carrinho = [];
let saboresSelecionados = {salgada:[], doce:[]};
let limiteSabores = {salgada:1, doce:1};

function alterarLimite(tipo){
let select = document.getElementById(tipo==="salgada"?"tamanhoSalgada":"tamanhoDoce");
let valor = select.value;

if(valor.includes("Pequena")) limiteSabores[tipo]=1;
if(valor.includes("Média")) limiteSabores[tipo]=2;
if(valor.includes("Grande")) limiteSabores[tipo]=3;

limparSabores(tipo);
}

function toggleSabor(el,nome,tipo){
if(el.classList.contains("selecionado")){
el.classList.remove("selecionado");
saboresSelecionados[tipo]=saboresSelecionados[tipo].filter(s=>s!==nome);
}else{
if(saboresSelecionados[tipo].length>=limiteSabores[tipo]){
alert("Máximo "+limiteSabores[tipo]+" sabores");
return;
}
el.classList.add("selecionado");
saboresSelecionados[tipo].push(nome);
}
}

function limparSabores(tipo){
saboresSelecionados[tipo]=[];
document.querySelectorAll("."+tipo).forEach(el=>el.classList.remove("selecionado"));
}

function adicionarPizza(tipo){
if(saboresSelecionados[tipo].length===0){
alert("Escolha pelo menos 1 sabor");
return;
}

let tamanhoSelect=document.getElementById(tipo==="salgada"?"tamanhoSalgada":"tamanhoDoce");
let tamanhoInfo=tamanhoSelect.value.split("-");
let tamanho=tamanhoInfo[0];
let preco=parseFloat(tamanhoInfo[1]);

let bordaSelect=document.getElementById(tipo==="salgada"?"bordaSalgada":"bordaDoce");
let bordaInfo=bordaSelect.value.split("-");
let nomeBorda=bordaInfo[0];
let precoBorda=parseFloat(bordaInfo[1]);

preco+=precoBorda;

let descricao=`Pizza ${tipo} ${tamanho} (${saboresSelecionados[tipo].join(", ")})`;
if(nomeBorda!=="Sem borda") descricao+=` + Borda ${nomeBorda}`;

carrinho.push({nome:descricao,preco});
atualizarCarrinho();
limparSabores(tipo);
}

function adicionarItem(nome,preco){
carrinho.push({nome,preco});
atualizarCarrinho();
}

function atualizarCarrinho(){
let lista=document.getElementById("listaCarrinho");
let totalSpan=document.getElementById("total");

lista.innerHTML="";
let total=0;

carrinho.forEach((item,index)=>{
total+=item.preco;
lista.innerHTML+=`${item.nome} - R$${item.preco} <span class="remover" onclick="removerItem(${index})">❌</span><br>`;
});

totalSpan.innerText=total;
}

function removerItem(index){
carrinho.splice(index,1);
atualizarCarrinho();
}

function enviarPedido(){
if(carrinho.length===0){
alert("Carrinho vazio!");
return;
}

let mensagem="Olá! Quero pedir:\n\n";
let total=0;

carrinho.forEach(item=>{
mensagem+=`${item.nome} - R$${item.preco}\n`;
total+=item.preco;
});

mensagem+=`\nTotal: R$${total}`;
mensagem+="\nTaxa de entrega será combinada no atendimento.";

let url=`https://wa.me/${NUMERO_WHATSAPP}?text=${encodeURIComponent(mensagem)}`;
window.open(url,"_blank");
}

alterarLimite("salgada");
alterarLimite("doce");
</script>

</body>
</html>
