<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cardápio Online</title>

<style>
body{
  font-family: Arial;
  background:#0f0f0f;
  color:white;
  padding:20px;
}

h1{
  text-align:center;
  color:#00a86b;
}

h2{
  margin-top:30px;
  color:#00a86b;
  border-bottom:1px solid #00a86b;
  padding-bottom:5px;
}

.produto{
  background:#1c1c1c;
  margin:15px 0;
  padding:15px;
  border-radius:12px;
  display:flex;
  gap:15px;
  align-items:center;
  box-shadow:0 0 10px rgba(0,168,107,0.2);
}

.produto img{
  width:100px;
  height:100px;
  object-fit:cover;
  border-radius:10px;
}

.info{
  flex:1;
}

.info h3{
  margin:0;
  color:#00ff9c;
}

.descricao{
  font-size:14px;
  color:#ccc;
  margin:5px 0;
}

.preco{
  font-weight:bold;
  margin:5px 0;
}

button{
  background:#00a86b;
  border:none;
  padding:8px 12px;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

button:hover{
  background:#008f5a;
}

select{
  padding:8px;
  margin-top:10px;
  background:#1c1c1c;
  color:white;
  border:1px solid #00a86b;
}

.carrinho{
  background:#1c1c1c;
  padding:15px;
  border-radius:12px;
  margin-top:30px;
}

ul{
  list-style:none;
  padding:0;
}

li{
  margin:5px 0;
  display:flex;
  justify-content:space-between;
}

.remover{
  color:red;
  cursor:pointer;
}
</style>
</head>

<body>

<div><input type="checkbox" value="Portuguesa"> Portuguesa — Presunto, ovo, cebola e azeitona</div>
<div><input type="checkbox" value="4 Queijos"> 4 Queijos — Mussarela, provolone, parmesão e gorgonzola</div>

<button onclick="adicionarPizza()">Adicionar Pizza</button>
